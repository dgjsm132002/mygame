<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家鄉傳統美食大主廚</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff9e6; text-align: center; padding: 20px; }
        .game-container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; border: 3px solid #ffa500; }
        h1 { color: #8b4513; }
        button { background-color: #ffa500; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 10px; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #d2691e; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🔍 家鄉傳統美食大主廚</h1>
    <p>我的文化，我的遊戲</p>
    <p>請憑藉記憶調配出最道地的傳統美食配方：</p>

    <div id="ingredients">
        <button onclick="select('發酵茶葉')">發酵茶葉</button>
        <button onclick="select('酥炸豆類')">酥炸豆類</button>
        <button onclick="select('番茄')">番茄</button>
        <button onclick="select('花生')">花生</button>
        <button onclick="select('辣椒')">辣椒</button>
    </div>

    <div id="bowl">
        <p>目前配方: <span id="mix">無</span></p>
    </div>

    <button onclick="check()">開始烹飪挑戰</button>
    <p id="result"></p>
</div>

<script>
    let currentMix = [];
    function select(item) {
        currentMix.push(item);
        document.getElementById('mix').innerText = currentMix.join(' + ');
    }

    function check() {
        if (currentMix.includes('發酵茶葉') && currentMix.includes('酥炸豆類')) {
            document.getElementById('result').innerText = "🎉 烹飪成功！這就是家鄉的味道！";
        } else {
            document.getElementById('result').innerText = "❌ 烹飪失敗！你遺漏了靈魂食材（發酵茶葉或酥炸豆類）。";
        }
    }
</script>

</body>
</html>
